services:
  app:
    build: .
    ports:
      - '8080:8080'
    environment:
      PORT: 8080
      DATA_DIR: /data
      TZ: America/Fortaleza
      ALOCHAT_BASE_URL: ${ALOCHAT_BASE_URL:-}
      ALOCHAT_API_KEY: ${ALOCHAT_API_KEY:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      APP_PASSWORD: ${APP_PASSWORD:-}
    volumes:
      - app-data:/data

volumes:
  app-data:
